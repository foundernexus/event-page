document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

  <script type="__bundler/template">
"<!DOCTYPE html>\n<html><head>\n<meta charset=\"utf-8\">\n<meta name=\"viewport\" content=\"width=device-width, initial-scale=1\">\n<script src=\"441b81d2-0b95-4046-b668-27ae17d5fd57\"><\u002Fscript>\n\n<\u002Fhead>\n<body>\n<x-dc>\n<helmet>\n  <style>/* FounderNexus webfonts — Plus Jakarta Sans (primary), Roboto (legacy/email/product) */\n\n@font-face {\n  font-family: \"Plus Jakarta Sans\";\n  src: url(\"dd58cd2f-85ca-4ce1-b938-b65159af8845\") format(\"woff2\");\n  font-style: normal;\n  font-weight: 400;\n  font-display: swap;\n}\n@font-face {\n  font-family: \"Plus Jakarta Sans\";\n  src: url(\"101cd751-e9b3-4eb7-a999-6abcde4c228d\") format(\"woff2\");\n  font-style: normal;\n  font-weight: 500;\n  font-display: swap;\n}\n@font-face {\n  font-family: \"Plus Jakarta Sans\";\n  src: url(\"db3bde1b-de25-4fb5-a710-56be5cffdd5f\") format(\"woff2\");\n  font-style: normal;\n  font-weight: 600;\n  font-display: swap;\n}\n@font-face {\n  font-family: \"Plus Jakarta Sans\";\n  src: url(\"fbba2696-6a13-459a-b1c5-4a3f050ad806\") format(\"woff2\");\n  font-style: normal;\n  font-weight: 700;\n  font-display: swap;\n}\n\n@font-face {\n  font-family: \"Roboto\";\n  src: url(\"a2db6e21-2247-483c-bea5-bfc832b3bb86\") format(\"woff2\");\n  font-style: normal;\n  font-weight: 400;\n  font-display: swap;\n}\n@font-face {\n  font-family: \"Roboto\";\n  src: url(\"d8693c3e-b827-47ae-80e1-24e9e9e2a50a\") format(\"woff2\");\n  font-style: normal;\n  font-weight: 500;\n  font-display: swap;\n}\n@font-face {\n  font-family: \"Roboto\";\n  src: url(\"96d9ea68-a7d1-4d3d-871b-856f624a36db\") format(\"woff2\");\n  font-style: normal;\n  font-weight: 700;\n  font-display: swap;\n}\n<\u002Fstyle>\n  <style>/* FounderNexus — Color tokens\n   Derived from the FounderNexus master .fig + distilled brand tokens.\n   Brand feel: white surfaces, deep navy text, decisive blue actions,\n   pale-blue supporting panels, restrained gray borders. */\n\n:root {\n  /* ---- Brand: navy (ink) ---- */\n  --navy-900: #01052A;   /* deep navy — primary text / headings */\n  --navy-800: #040A43;   /* action-deep navy */\n  --navy-700: #061B2C;   /* rich navy — dark surfaces, event hero */\n  --navy-600: #0C2438;\n  --ink-900:  #202020;   /* near black */\n  --black:    #000000;\n\n  /* ---- Brand: blue (action) ---- */\n  --blue-700: #0059A8;\n  --blue-600: #0072BA;   /* secondary blue */\n  --blue-500: #007BE4;   /* PRIMARY action blue */\n  --blue-450: #1E88E5;\n  --blue-400: #2196F3;\n  --blue-action: #215BE3;/* action blue variant (links/focus) */\n  --blue-300: #66B2F0;\n  --blue-200: #A6D2F7;\n  --blue-100: #D3EAFD;   /* soft blue — chips / selected surface */\n  --blue-50:  #F1F8FF;   /* pale blue — emphasis panels */\n\n  /* ---- Neutrals (gray) ---- */\n  --white:    #FFFFFF;\n  --gray-25:  #FCFCFD;\n  --gray-50:  #F9F9F9;   /* light page surface */\n  --gray-100: #F1F5F9;   /* light gray surface */\n  --gray-200: #E2E8F0;\n  --gray-300: #D0D5DD;   /* border gray 2 */\n  --gray-350: #D3D6DA;   /* border gray */\n  --gray-400: #9EADBA;   /* secondary muted text */\n  --gray-500: #64748B;\n  --gray-600: #56646F;   /* muted text */\n  --gray-700: #475467;\n  --gray-800: #334155;\n\n  /* ---- Semantic status ---- */\n  --green-500: #1F9D55;\n  --green-50:  #E7F6EE;\n  --red-500:   #D92D20;\n  --red-50:    #FEF3F2;\n  --amber-500: #F59E0B;\n  --amber-50:  #FEF6E0;\n  --yellow:    #FFCC00;   /* product-UI status label only — never dominant */\n\n  /* ===================================================================\n     SEMANTIC ALIASES — prefer these in components\n     =================================================================== */\n\n  /* Text */\n  --text-primary:   var(--navy-900);\n  --text-secondary: var(--gray-600);\n  --text-muted:     var(--gray-400);\n  --text-on-dark:   var(--white);\n  --text-link:      var(--blue-500);\n  --text-brand:     var(--blue-500);\n\n  /* Surfaces */\n  --surface-page:    var(--gray-50);\n  --surface-card:    var(--white);\n  --surface-raised:  var(--white);\n  --surface-subtle:  var(--gray-100);\n  --surface-accent:  var(--blue-50);   /* pale blue emphasis panel */\n  --surface-chip:    var(--blue-100);  /* soft blue chip */\n  --surface-dark:    var(--navy-700);  /* event hero / dark blocks */\n  --surface-darkest: var(--navy-900);\n\n  /* Borders */\n  --border-subtle:  var(--gray-200);\n  --border-default: var(--gray-350);\n  --border-strong:  var(--gray-300);\n  --border-focus:   var(--blue-500);\n\n  /* Actions */\n  --action-primary:        var(--blue-500);\n  --action-primary-hover:  var(--blue-600);\n  --action-primary-active: var(--blue-700);\n  --action-disabled:       var(--gray-200);\n  --action-disabled-text:  var(--gray-400);\n\n  /* Status (semantic) */\n  --status-success: var(--green-500);\n  --status-success-bg: var(--green-50);\n  --status-error:   var(--red-500);\n  --status-error-bg: var(--red-50);\n  --status-warning: var(--amber-500);\n  --status-warning-bg: var(--amber-50);\n  --status-info:    var(--blue-500);\n  --status-info-bg: var(--blue-50);\n}\n<\u002Fstyle>\n  <style>/* FounderNexus — Typography tokens\n   Primary: Plus Jakarta Sans. Secondary (legacy email / product UI): Roboto. */\n\n:root {\n  /* Families */\n  --font-sans: \"Plus Jakarta Sans\", -apple-system, BlinkMacSystemFont, \"Segoe UI\", sans-serif;\n  --font-product: \"Roboto\", \"Plus Jakarta Sans\", -apple-system, sans-serif;\n  --font-display: \"Plus Jakarta Sans\", -apple-system, sans-serif;\n\n  /* Weights */\n  --fw-regular: 400;   /* @kind font */\n  --fw-medium: 500;    /* @kind font */\n  --fw-semibold: 600;  /* @kind font */\n  --fw-bold: 700;      /* @kind font */\n\n  /* Type scale (px) — found in source */\n  --fs-xs: 12px;     /* small labels / meta */\n  --fs-sm: 14px;     /* secondary body, controls */\n  --fs-base: 16px;   /* body default */\n  --fs-md: 18px;     /* lead body */\n  --fs-lg: 20px;     /* small section heading */\n  --fs-xl: 24px;     /* section heading */\n  --fs-2xl: 30px;    /* large section heading */\n  --fs-3xl: 40px;    /* hero / page title */\n  --fs-4xl: 50px;    /* large hero */\n  --fs-5xl: 80px;    /* display hero (desktop) */\n\n  /* Line heights */\n  --lh-tight: 1.1;    /* @kind font */\n  --lh-snug: 1.25;    /* @kind font */\n  --lh-normal: 1.45;  /* @kind font */\n  --lh-relaxed: 1.6;  /* @kind font */\n\n  /* Letter spacing */\n  --ls-tight: -0.02em;   /* @kind font */\n  --ls-snug: -0.01em;    /* @kind font */\n  --ls-normal: 0;        /* @kind font */\n  --ls-wide: 0.04em;     /* @kind font */\n\n  /* ---- Semantic roles ---- */\n  --text-display: var(--fw-bold) var(--fs-5xl)/var(--lh-tight) var(--font-display);\n  --text-h1: var(--fw-bold) var(--fs-3xl)/var(--lh-snug) var(--font-display);\n  --text-h2: var(--fw-semibold) var(--fs-2xl)/var(--lh-snug) var(--font-sans);\n  --text-h3: var(--fw-semibold) var(--fs-xl)/var(--lh-snug) var(--font-sans);\n  --text-h4: var(--fw-semibold) var(--fs-lg)/var(--lh-normal) var(--font-sans);\n  --text-body: var(--fw-regular) var(--fs-base)/var(--lh-relaxed) var(--font-sans);\n  --text-body-sm: var(--fw-regular) var(--fs-sm)/var(--lh-relaxed) var(--font-sans);\n  --text-label: var(--fw-medium) var(--fs-sm)/var(--lh-normal) var(--font-sans);\n  --text-meta: var(--fw-medium) var(--fs-xs)/var(--lh-normal) var(--font-sans);\n}\n<\u002Fstyle>\n  <style>/* FounderNexus — Spacing, radius, shadow tokens. 8px-based rhythm. */\n\n:root {\n  /* Spacing scale */\n  --space-0: 0;\n  --space-1: 4px;    /* tight internal */\n  --space-2: 8px;\n  --space-3: 12px;\n  --space-4: 16px;\n  --space-5: 20px;\n  --space-6: 24px;   /* card padding */\n  --space-8: 32px;\n  --space-10: 40px;\n  --space-12: 48px;\n  --space-16: 64px;  /* major section separation */\n  --space-20: 80px;\n  --space-24: 96px;\n\n  /* Radii — compact, restrained */\n  --radius-xs: 4px;    /* compact controls, product/table UI */\n  --radius-sm: 6px;\n  --radius-md: 8px;    /* buttons, inputs, default cards */\n  - s:50%; background:#4DA8F5;\"><\u002Fspan>Stage 2 · Series A<\u002Fspan>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n\n  <!-- ===== Floating ticket ===== -->\n  <div style=\"max-width:1100px; margin:-94px auto 0; padding:0 40px; position:relative; z-index:2;\">\n    <div style=\"background:#fff; border:1px solid #E7EBF0; border-radius:20px; box-shadow:0 24px 60px rgba(1,5,42,.20); padding:24px 30px; display:flex; align-items:center; gap:26px;\">\n      <div style=\"text-align:center; background:#061B2C; color:#fff; border-radius:14px; padding:13px 0; width:80px; flex:none;\">\n        <div style=\"font:700 28px/1 var(--font-display);\">02<\u002Fdiv>\n        <div style=\"font:600 11px/1 var(--font-sans); letter-spacing:0.12em; text-transform:uppercase; margin-top:5px; color:#8FC2F2;\">Jul<\u002Fdiv>\n      <\u002Fdiv>\n      <div style=\"flex:none;\">\n        <div style=\"font:600 11px/1 var(--font-sans); letter-spacing:0.05em; text-transform:uppercase; color:#9EADBA; margin-bottom:7px;\">When<\u002Fdiv>\n        <div style=\"font:700 16px/1.25 var(--font-sans); color:#01052A;\">Thu, July 2<\u002Fdiv>\n        <div style=\"font:500 13px/1.3 var(--font-sans); color:#56646F; margin-top:2px;\">8:00–9:00 PM PT<\u002Fdiv>\n      <\u002Fdiv>\n      <div style=\"width:1px; align-self:stretch; background:#EDF0F3;\"><\u002Fdiv>\n      <div style=\"flex:none;\">\n        <div style=\"font:600 11px/1 var(--font-sans); letter-spacing:0.05em; text-transform:uppercase; color:#9EADBA; margin-bottom:7px;\">Where<\u002Fdiv>\n        <div style=\"display:flex; align-items:center; gap:8px; font:700 16px/1.25 var(--font-sans); color:#01052A;\"><span style=\"color:#007BE4; display:inline-flex;\"><svg width=\"17\" height=\"17\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><rect x=\"2\" y=\"6\" width=\"14\" height=\"12\" rx=\"2.5\"><\u002Frect><path d=\"m16 10 6-3v10l-6-3\"><\u002Fpath><\u002Fsvg><\u002Fspan>Live on Zoom<\u002Fdiv>\n        <div style=\"font:500 13px/1.3 var(--font-sans); color:#56646F; margin-top:2px;\">Link sent on registration<\u002Fdiv>\n      <\u002Fdiv>\n      <div style=\"width:1px; align-self:stretch; background:#EDF0F3;\"><\u002Fdiv>\n      <div style=\"flex:1;\">\n        <div style=\"font:600 11px/1 var(--font-sans); letter-spacing:0.05em; text-transform:uppercase; color:#9EADBA; margin-bottom:7px;\">Access<\u002Fdiv>\n        <div style=\"font:700 16px/1.25 var(--font-sans); color:#01052A;\">{{ accessLabel }}<\u002Fdiv>\n        <div style=\"font:500 13px/1.3 var(--font-sans); color:#56646F; margin-top:2px;\">{{ accessSub }}<\u002Fdiv>\n      <\u002Fdiv>\n      <div style=\"display:flex; flex-direction:column; gap:8px; flex:none; width:210px;\">\n        <x-import component-from-global-scope=\"FounderNexusDesignSystem_c60151.Button\" size=\"lg\" full-width=\"{{ true }}\" hint-size=\"100%,52px\">{{ ctaLabel }}<\u002Fx-import>\n        <x-import component-from-global-scope=\"FounderNexusDesignSystem_c60151.Button\" variant=\"ghost\" size=\"sm\" full-width=\"{{ true }}\" icon-right=\"mail\" hint-size=\"100%,36px\">Invite a founder<\u002Fx-import>\n      <\u002Fdiv>\n    <\u002Fdiv>\n    <p style=\"font:400 13px/1.5 var(--font-sans); color:#9EADBA; margin:14px 0 0; text-align:center;\"><span>{{ noteText }}<\u002Fspan> Not a member yet? <a href=\"#\" style=\"color:#215BE3; font-weight:600; text-decoration:none;\">Apply now →<\u002Fa><\u002Fp>\n  <\u002Fdiv>\n\n  <!-- ===== About this session ===== -->\n  <section style=\"max-width:1100px; margin:0 auto; padding:64px 40px 8px;\">\n    <div style=\"display:grid; grid-template-columns:0.92fr 1.08fr; gap:56px; align-items:start;\">\n      <div>\n        <div style=\"font:600 12px/1 var(--font-sans); letter-spacing:0.05em; text-transform:uppercase; color:#007BE4; margin-bottom:14px;\">About this session<\u002Fdiv>\n        <h2 style=\"font:700 31px/1.18 var(--font-display); letter-spacing:-0.02em; color:#01052A; margin:0;\">Most pitch deck advice is generic. This isn't.<\u002Fh2>\n        <p style=\"font:400 16px/1.65 var(--font-sans); color:#475467; margin:16px 0 0;\">For one hour, you'll watch a seasoned VC open a real founder's actual deck and react the way he would in a real partner meeting. No hypotheticals, no polished \"after\" version — an honest, live teardown of a deck that's out in the world right now.<\u002Fp>\n        <div style=\"display:inline-flex; align-items:center; gap:9px; margin-top:22px; font:600 13px/1 var(--font-sans); color:#56646F;\">\n          <span style=\"color:#007BE4; display:inline-flex;\"><svg width=\"17\" height=\"17\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><circle cx=\"12\" cy=\"12\" r=\"9\"><\u002Fcircle><path d=\"M12 7v5l3 2\"><\u002Fpath><\u002Fsvg><\u002Fspan>\n          60 minutes · live teardown followed by open Q&amp;A\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <div style=\"display:flex; flex-direction:column; gap:16px; padding-top:6px;\">\n        <div style=\"font:600 12px/1 var(--font-sans); letter-spacing:0.05em; text-transform:uppercase; color:#9EADBA; margin-bottom:2px;\">What you'll walk away with<\u002Fdiv>\n        <div style=\"display:flex; gap:14px; align-items:flex-start;\">\n          <span style=\"flex:none; width:30px; height:30px; border-radius:9px; background:#E3F6EC; color:#1F9D55; display:inline-flex; align-items:center; justify-content:center;\"><svg width=\"17\" height=\"17\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2.4\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><path d=\"M20 6 9 17l-5-5\"><\u002Fpath><\u002Fsvg><\u002Fspan>\n          <div style=\"font:600 16px/1.45 var(--font-sans); color:#01052A; padding-top:3px;\">A live, slide-by-slide review of a real seed-stage deck<\u002Fdiv>\n        <\u002Fdiv>\n        <div style=\"display:flex; gap:14px; align-items:flex-start;\">\n          <span style=\"flex:none; width:30px; height:30px; border-radius:9px; background:#E3F6EC; color:#1F9D55; display:inline-flex; align-items:center; justify-content:center;\"><svg width=\"17\" height=\"17\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2.4\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><path d=\"M20 6 9 17l-5-5\"><\u002Fpath><\u002Fsvg><\u002Fspan>\n          <div style=\"font:600 16px/1.45 var(--font-sans); color:#01052A; padding-top:3px;\">What a VC actually looks for — and what makes them lose interest<\u002Fdiv>\n        <\u002Fdiv>\n        <div style=\"display:flex; gap:14px; align-items:flex-start;\">\n          <span style=\"flex:none; width:30px; height:30px; border-radius:9px; background:#E3F6EC; color:#1F9D55; display:inline-flex; align-items:center; justify-content:center;\"><svg width=\"17\" height=\"17\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2.4\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><path d=\"M20 6 9 17l-5-5\"><\u002Fpath><\u002Fsvg><\u002Fspan>\n          <div style=\"font:600 16px/1.45 var(--font-sans); color:#01052A; padding-top:3px;\">The line between a slide that works and one that raises questions<\u002Fdiv>\n        <\u002Fdiv>\n        <div style=\"display:flex; gap:14px; align-items:flex-start;\">\n          <span style=\"flex:none; width:30px; height:30px; border-radius:9px; background:#E3F6EC; color:#1F9D55; display:inline-flex; align-items:center; justify-content:center;\"><svg width=\"17\" height=\"17\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2.4\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><path d=\"M20 6 9 17l-5-5\"><\u002Fpath><\u002Fsvg><\u002Fspan>\n          <div style=\"font:600 16px/1.45 var(--font-sans); color:#01052A; padding-top:3px;\">Open Q&amp;A — bring your own deck and fundraising questions<\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- ===== Speaker ===== -->\n  <section style=\"background:#F7FAFD; border-top:1px solid #EEF1F4;\">\n    <div style=\"max-width:1100px; margin:0 auto; padding:60px 40px;\">\n      <div style=\"display:grid; grid-template-columns:300px 1fr; background:#fff; border:1px solid #E7EBF0; border-radius:24px; box-shadow:0 16px 48px rgba(1,5,42,.09); overflow:hidden;\">\n        <div style=\"position:relative; background:#061B2C; min-height:404px;\">\n          <img src=\"564c81d5-79ae-49d1-a06e-73dbd9506e82\" alt=\"Isaac Kato\" style=\"width:100%; height:100%; object-fit:cover; display:block;\">\n          <div style=\"position:absolute; left:16px; bottom:16px; display:inline-flex; align-items:center; gap:7px; height:30px; padding:0 13px; border-radius:9999px; background:rgba(6,27,44,.7); border:1px solid rgba(255,255,255,.22); font:600 12px/1 var(--font-sans); color:#fff;\"><span style=\"width:7px; height:7px; border-radius:50%; background:#2DD4BF;\"><\u002Fspan>Hosting this session<\u002Fdiv>\n        <\u002Fdiv>\n        <div style=\"padding:40px 44px;\">\n          <div style=\"font:600 12px/1 var(--font-sans); letter-spacing:0.05em; text-transform:uppercase; color:#007BE4; margin-bottom:13px;\">The VC in the room<\u002Fdiv>\n          <h2 style=\"font:700 32px/1.08 var(--font-display); letter-spacing:-0.02em; color:#01052A; margin:0;\">Isaac Kato<\u002Fh2>\n          <div style=\"font:600 16px/1.3 var(--font-sans); color:#007BE4; margin-top:6px;\">Founding General Partner · Two Ravens VC<\u002Fdiv>\n          <p style=\"font:400 16px/1.65 var(--font-sans); color:#475467; margin:18px 0 0; max-width:600px;\">A 3x founder with three exits and two decades investing at the earliest stage, backing extraordinary founders from non-obvious backgrounds. He has seen thousands of decks from both sides of the table.<\u002Fp>\n          <div style=\"display:flex; flex-wrap:wrap; gap:8px; margin-top:20px;\">\n            <span style=\"display:inline-flex; align-items:center; height:28px; padding:0 12px; border-radius:9999px; background:#F1F8FF; border:1px solid #DCEBFB; font:600 12.5px/1 var(--font-sans); color:#0063BE;\">Techstars Seattle<\u002Fspan>\n            <span style=\"display:inline-flex; align-items:center; height:28px; padding:0 12px; border-radius:9999px; background:#F1F8FF; border:1px solid #DCEBFB; font:600 12.5px/1 var(--font-sans); color:#0063BE;\">Filecoin Accelerator<\u002Fspan>\n            <span style=\"display:inline-flex; align-items:center; height:28px; padding:0 12px; border-radius:9999px; background:#F1F8FF; border:1px solid #DCEBFB; font:600 12.5px/1 var(--font-sans); color:#0063BE;\">Mighty AI → Uber<\u002Fspan>\n            <span style=\"display:inline-flex; align-items:center; height:28px; padding:0 12px; border-radius:9999px; background:#F1F8FF; border:1px solid #DCEBFB; font:600 12.5px/1 var(--font-sans); color:#0063BE;\">Verne Global<\u002Fspan>\n          <\u002Fdiv>\n          <div style=\"display:flex; gap:40px; margin-top:26px; padding-top:24px; border-top:1px solid #EEF1F4; flex-wrap:wrap;\">\n            <div><div style=\"font:700 23px/1 var(--font-display); color:#01052A;\">$200M+<\u002Fdiv><div style=\"font:500 13px/1.3 var(--font-sans); color:#56646F; margin-top:6px;\">capital raised<\u002Fdiv><\u002Fdiv>\n            <div><div style=\"font:700 23px/1 var(--font-display); color:#01052A;\">3 exits<\u002Fdiv><div style=\"font:500 13px/1.3 var(--font-sans); color:#56646F; margin-top:6px;\">as a founder<\u002Fdiv><\u002Fdiv>\n            <div><div style=\"font:700 23px/1 var(--font-display); color:#01052A;\">44<\u002Fdiv><div style=\"font:500 13px/1.3 var(--font-sans); color:#56646F; margin-top:6px;\">Techstars investments<\u002Fdiv><\u002Fdiv>\n            <div><div style=\"font:700 23px/1 var(--font-display); color:#01052A;\">2 decades<\u002Fdiv><div style=\"font:500 13px/1.3 var(--font-sans); color:#56646F; margin-top:6px;\">investing &amp; building<\u002Fdiv><\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- ===== Stage & decision band (recurring, toggleable) ===== -->\n  <sc-if value=\"{{ showStageBand }}\" hint-placeholder-val=\"{{ true }}\">\n  <section style=\"background:#FBFCFE; border-top:1px solid #EEF1F4; border-bottom:1px solid #EEF1F4;\">\n    <div style=\"max-width:1100px; margin:0 auto; padding:56px 40px;\">\n      <div style=\"max-width:680px; margin-bottom:32px;\">\n        <div style=\"font:600 12px/1 var(--font-sans); letter-spacing:0.05em; text-transform:uppercase; color:#007BE4; margin-bottom:13px;\">How our rooms work<\u002Fdiv>\n        <h2 style=\"font:700 28px/1.18 var(--font-display); letter-spacing:-0.02em; color:#01052A; margin:0;\">Organized by stage and decision, not geography<\u002Fh2>\n        <p style=\"font:400 16px/1.6 var(--font-sans); color:#56646F; margin:14px 0 0; max-width:600px;\">FounderNexus rooms put you with founders carrying the same decision you are. This session is built for <strong style=\"color:#01052A; font-weight:600;\">Stage 1 and Stage 2<\u002Fstrong> — founders who are raising or sharpening their story.<\u002Fp>\n      <\u002Fdiv>\n      <div style=\"display:grid; grid-template-columns:repeat(4,1fr); gap:16px;\">\n        <div style=\"position:relative; background:#fff; border:1px solid #C7E8E3; border-radius:16px; padding:20px; box-shadow:0 6px 20px rgba(14,165,164,.08); overflow:hidden;\">\n          <div style=\"position:absolute; top:0; left:0; right:0; height:4px; background:#0EA5A4;\"><\u002Fdiv>\n          <div style=\"display:flex; align-items:center; justify-content:space-between; margin-bottom:14px;\">\n            <span style=\"display:inline-flex; width:38px; height:38px; border-radius:11px; background:#E8F6F4; color:#0B7A74; font:700 15px/1 var(--font-display); align-items:center; justify-content:center;\">01<\u002Fspan>\n            <span style=\"font:600 10px/1 var(--font-sans); letter-spacing:0.04em; text-transform:uppercase; color:#0B7A74; background:#E8F6F4; padding:5px 8px; border-radius:9999px;\">This session<\u002Fspan>\n          <\u002Fdiv>\n          <div style=\"font:700 16px/1.2 var(--font-sans); color:#01052A;\">Stage 1<\u002Fdiv>\n          <div style=\"font:600 12.5px/1.3 var(--font-sans); color:#0B7A74; margin-top:5px;\">$0–2M ARR · Pre-seed / Seed<\u002Fdiv>\n          <p style=\"font:400 12.5px/1.55 var(--font-sans); color:#56646F; margin:10px 0 0;\">MVP, ICP discovery, co-founder fit, early GTM — the search for product-market fit.<\u002Fp>\n        <\u002Fdiv>\n        <div style=\"position:relative; background:#fff; border:1px solid #CFE6FB; border-radius:16px; padding:20px; box-shadow:0 6px 20px rgba(0,123,228,.08); overflow:hidden;\">\n          <div style=\"position:absolute; top:0; left:0; right:0; height:4px; background:#007BE4;\"><\u002Fdiv>\n          <div style=\"display:flex; align-items:center; justify-content:space-between; margin-bottom:14px;\">\n            <span style=\"display:inline-flex; width:38px; height:38px; border-radius:11px; background:#F1F8FF; color:#0063BE; font:700 15px/1 var(--font-display); align-items:center; justify-content:center;\">02<\u002Fspan>\n            <span style=\"font:600 10px/1 var(--font-sans); letter-spacing:0.04em; text-transform:uppercase; color:#0063BE; background:#F1F8FF; padding:5px 8px; border-radius:9999px;\">This session<\u002Fspan>\n          <\u002Fdiv>\n          <div style=\"font:700 16px/1.2 var(--font-sans); color:#01052A;\">Stage 2<\u002Fdiv>\n          <div style=\"font:600 12.5px/1.3 var(--font-sans); color:#0063BE; margin-top:5px;\">$2–10M ARR · Series A<\u002Fdiv>\n          <p style=\"font:400 12.5px/1.55 var(--font-sans); color:#56646F; margin:10px 0 0;\">A repeatable sales motion, customer profiling, outbound, and the first leadership hires.<\u002Fp>\n        <\u002Fdiv>\n        <div style=\"position:relative; background:#fff; border:1px solid #E7EBF0; border-radius:16px; padding:20px; overflow:hidden;\">\n          <div style=\"position:absolute; top:0; left:0; right:0; height:4px; background:#E1E6EC;\"><\u002Fdiv>\n          <div style=\"display:flex; align-items:center; margin-bottom:14px;\">\n            <span style=\"display:inline-flex; width:38px; height:38px; border-radius:11px; background:#F2F4F7; color:#98A2B3; font:700 15px/1 var(--font-display); align-items:center; justify-content:center;\">03<\u002Fspan>\n          <\u002Fdiv>\n          <div style=\"font:700 16px/1.2 var(--font-sans); color:#475467;\">Stage 3<\u002Fdiv>\n          <div style=\"font:600 12.5px/1.3 var(--font-sans); color:#98A2B3; margin-top:5px;\">$10–50M ARR · Series B / C<\u002Fdiv>\n          <p style=\"font:400 12.5px/1.55 var(--font-sans); color:#98A2B3; margin:10px 0 0;\">Senior and executive hires, board dynamics, and the first hard scaling decisions.<\u002Fp>\n        <\u002Fdiv>\n        <div style=\"position:relative; background:#fff; border:1px solid #E7EBF0; border-radius:16px; padding:20px; overflow:hidden;\">\n          <div style=\"position:absolute; top:0; left:0; right:0; height:4px; background:#E1E6EC;\"><\u002Fdiv>\n          <div style=\"display:flex; align-items:center; margin-bottom:14px;\">\n            <span style=\"display:inline-flex; width:38px; height:38px; border-radius:11px; background:#F2F4F7; color:#98A2B3; font:700 15px/1 var(--font-display); align-items:center; justify-content:center;\">04<\u002Fspan>\n          <\u002Fdiv>\n          <div style=\"font:700 16px/1.2 var(--font-sans); color:#475467;\">Stage 4<\u002Fdiv>\n          <div style=\"font:600 12.5px/1.3 var(--font-sans); color:#98A2B3; margin-top:5px;\">$50M+ ARR · Series D+<\u002Fdiv>\n          <p style=\"font:400 12.5px/1.55 var(--font-sans); color:#98A2B3; margin:10px 0 0;\">Executive redesign, board pressure, and market expansion — the decisions of a mature company.<\u002Fp>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n
